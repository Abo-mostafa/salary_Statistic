    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; color: #e0e0e0; padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center; padding: 30px 20px;
            background: rgba(255,255,255,0.05); border-radius: 20px;
            margin-bottom: 25px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 2.2rem; color: #e94560; margin-bottom: 10px; text-shadow: 0 0 20px rgba(233, 69, 96, 0.3); }
        .header p { color: #a0a0a0; font-size: 1rem; }
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px); transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .stat-card .number { font-size: 2rem; font-weight: 700; color: #e94560; }
        .stat-card .label { color: #a0a0a0; font-size: 0.9rem; margin-top: 5px; }
        .controls {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between;
        }
        .filter-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .filter-btn {
            padding: 10px 20px; border: 2px solid #e94560; background: transparent;
            color: #e94560; border-radius: 25px; cursor: pointer;
            font-family: 'Cairo', sans-serif; font-weight: 600; transition: all 0.3s; font-size: 0.9rem;
        }
        .filter-btn:hover, .filter-btn.active { background: #e94560; color: white; box-shadow: 0 0 20px rgba(233, 69, 96, 0.4); }
        .search-box { position: relative; flex: 1; min-width: 250px; }
        .search-box input {
            width: 100%; padding: 12px 45px 12px 15px;
            border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2);
            color: white; border-radius: 25px; font-family: 'Cairo', sans-serif;
            font-size: 1rem; outline: none; transition: border-color 0.3s;
        }
        .search-box input:focus { border-color: #e94560; }
        .search-box .icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #e94560; font-size: 1.2rem; }
        .branch-filter {
            padding: 10px 15px; border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2); color: white; border-radius: 25px;
            font-family: 'Cairo', sans-serif; cursor: pointer; outline: none;
        }
        .branch-filter option { background: #1a1a2e; color: white; }
        .table-container {
            background: rgba(255,255,255,0.03); border-radius: 20px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        .table-header {
            display: grid; grid-template-columns: 50px 2fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 80px;
            background: rgba(233, 69, 96, 0.2); padding: 15px 10px; font-weight: 700;
            color: #e94560; font-size: 0.85rem; text-align: center; gap: 5px;
        }
        .table-row {
            display: grid; grid-template-columns: 50px 2fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 80px;
            padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
            align-items: center; gap: 5px; transition: background 0.3s;
        }
        .table-row:hover { background: rgba(255,255,255,0.05); }
        .table-row.received { background: rgba(46, 204, 113, 0.1); }
        .table-row.received .name-cell { text-decoration: line-through; opacity: 0.7; }
        .cell { text-align: center; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .name-cell { text-align: right; font-weight: 600; color: #fff; }
        .branch-tag { display: inline-block; padding: 3px 10px; background: rgba(233, 69, 96, 0.2); border-radius: 10px; font-size: 0.75rem; color: #e94560; }
        .checkbox-cell { display: flex; justify-content: center; align-items: center; }
        .custom-checkbox {
            width: 24px; height: 24px; border: 2px solid #e94560; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; background: transparent;
        }
        .custom-checkbox.checked { background: #2ecc71; border-color: #2ecc71; }
        .custom-checkbox.checked::after { content: '✓'; color: white; font-weight: bold; font-size: 14px; }
        .amount { font-family: 'Courier New', monospace; font-weight: 600; }
        .positive { color: #2ecc71; }
        .negative { color: #e94560; }
        .net-amount { color: #f1c40f; font-weight: 700; font-size: 1rem; }
        .no-results { text-align: center; padding: 50px; color: #a0a0a0; font-size: 1.2rem; }
        .export-btn {
            padding: 10px 20px; background: #2ecc71; color: white; border: none;
            border-radius: 25px; cursor: pointer; font-family: 'Cairo', sans-serif;
            font-weight: 600; transition: all 0.3s;
        }
        .export-btn:hover { background: #27ae60; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #f1c40f); border-radius: 3px; transition: width 0.5s; }
        @media (max-width: 1200px) { .table-header, .table-row { grid-template-columns: 40px 2fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 70px; font-size: 0.75rem; } }

        .toast {

            opacity: 0; transition: opacity 0.3s; z-index: 1000;
        }
        .toast.show { opacity: 1; }
    </style>

        let currentFilter = 'all', currentBranch = 'all', searchTerm = '';

        function loadSavedState() {
            const saved = localStorage.getItem('salary_received_state');
            if (saved) {
                const state = JSON.parse(saved);
                employees.forEach(emp => { if (state[emp.id] !== undefined) emp.received = state[emp.id]; });
            }
        }
        function saveState() {
            const state = {};
            employees.forEach(emp => { state[emp.id] = emp.received; });
            localStorage.setItem('salary_received_state', JSON.stringify(state));
            showToast('تم حفظ الحالة بنجاح!');
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        function populateBranches() {
            const branches = [...new Set(employees.map(e => e.branch))];
            const sel = document.getElementById('branchFilter');
            branches.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; sel.appendChild(o); });
        }
        function toggleReceived(id) {
            const emp = employees.find(e => e.id === id);
            if (emp) { emp.received = !emp.received; renderTable(); updateStats(); saveState(); }
        }
        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(btn => { btn.classList.remove('active'); if (btn.dataset.filter === f) btn.classList.add('active'); });
            renderTable();
        }
        function filterByBranch() { currentBranch = document.getElementById('branchFilter').value; renderTable(); }
        function searchEmployees() { searchTerm = document.getElementById('searchInput').value.toLowerCase(); renderTable(); }
        function getFiltered() {
            return employees.filter(emp => {
                if (currentFilter === 'received' && !emp.received) return false;
                if (currentFilter === 'pending' && emp.received) return false;
                if (currentBranch !== 'all' && emp.branch !== currentBranch) return false;
                if (searchTerm && !emp.name.toLowerCase().includes(searchTerm)) return false;
                return true;
            });
        }
        function renderTable() {
            const filtered = getFiltered();
            const tbody = document.getElementById('tableBody');
            if (filtered.length === 0) { tbody.innerHTML = '<div class="no-results">لا توجد نتائج مطابقة للبحث</div>'; return; }
            tbody.innerHTML = filtered.map(emp => `
                <div class="table-row ${emp.received ? 'received' : ''}">
                    <div class="cell">${emp.id}</div>
                    <div class="cell name-cell">${emp.name}</div>
                    <div class="cell hide-mobile-sm"><span class="branch-tag">${emp.branch}</span></div>
                    <div class="cell amount">${emp.salary.toLocaleString()}</div>
                    <div class="cell hide-mobile">${emp.days}</div>
                    <div class="cell amount negative hide-mobile">${emp.withdrawals > 0 ? '-' + emp.withdrawals.toLocaleString() : '0'}</div>
                    <div class="cell amount positive hide-mobile">${emp.extra > 0 ? '+' + emp.extra.toLocaleString() : '0'}</div>
                    <div class="cell amount positive hide-mobile">${emp.bonuses > 0 ? '+' + emp.bonuses.toLocaleString() : '0'}</div>
                    <div class="cell amount negative hide-mobile">${emp.penalties > 0 ? '-' + emp.penalties.toLocaleString() : '0'}</div>
                    <div class="cell net-amount">${emp.net.toLocaleString()}</div>
                    <div class="cell hide-mobile">${emp.notes || '-'}</div>
                    <div class="cell checkbox-cell">
                        <div class="custom-checkbox ${emp.received ? 'checked' : ''}" onclick="toggleReceived(${emp.id})" title="${emp.received ? 'تم الاستلام - اضغط للإلغاء' : 'اضغط للتأكيد على الاستلام'}"></div>
                    </div>
                </div>
            `).join('');
        }
        function updateStats() {
            const total = employees.length;
            const received = employees.filter(e => e.received).length;
            const pending = total - received;
            const totalSalary = employees.reduce((sum, e) => sum + e.net, 0);
            document.getElementById('totalEmployees').textContent = total;
            document.getElementById('totalSalary').textContent = totalSalary.toLocaleString() + ' ريال';
            document.getElementById('receivedCount').textContent = received + ' / ' + total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('receivedProgress').style.width = (received / total * 100) + '%';
        }
        function exportData() {
            const data = employees.map(emp => ({
                'الاسم': emp.name, 'الفرع': emp.branch, 'الراتب': emp.salary, 'الحضور': emp.days,
                'السحبيات': emp.withdrawals, 'الإضافي': emp.extra, 'المكافآت': emp.bonuses,
                'العقوبات': emp.penalties, 'الصافي': emp.net,
                'حالة الاستلام': emp.received ? 'تم الاستلام' : 'لم يتم الاستلام', 'ملاحظات': emp.notes
            }));
            const headers = Object.keys(data[0]);
            const csv = [headers.join(','), ...data.map(row => headers.map(h => `"${row[h]}"`).join(','))].join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'كشوف_المرتبات_' + new Date().toLocaleDateString('ar-SA') + '.csv';
            link.click();
            showToast('تم تصدير البيانات بنجاح!');
        }
        loadSavedState(); populateBranches(); renderTable(); updateStats();
    </script>
